<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gen 3 Battle Engine</title>
<style>
:root { --bg: #1a1b26; --bg2: #24283b; --bg3: #2f3347; --fg: #c0caf5; --fg2: #787c99; --accent: #7aa2f7; --green: #9ece6a; --red: #f7768e; --yellow: #e0af68; --orange: #ff9e64; --purple: #bb9af7; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
h1 { font-size: 18px; font-weight: 500; color: var(--fg2); padding: 12px 0; text-align: center; letter-spacing: 1px; }

/* Eval bar */
.eval-container { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.eval-bar { flex: 1; height: 28px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.eval-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; border-radius: 4px 0 0 4px; }
.eval-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); z-index: 1; }
.eval-pct { font-size: 20px; font-weight: 600; min-width: 65px; text-align: right; }
.depth-badge { font-size: 11px; color: var(--fg2); background: var(--bg3); padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.depth-badge.running::after { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin-left: 5px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Teams */
.battlefield { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.team { background: var(--bg2); border-radius: 8px; padding: 14px; }
.team-header { font-size: 12px; color: var(--fg2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.pokemon { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; transition: background 0.2s; }
.pokemon.active { background: var(--bg3); border-left: 3px solid var(--accent); }
.pokemon.fainted { opacity: 0.35; }
.pokemon-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.pokemon-name { font-size: 14px; font-weight: 500; }
.pokemon-hp-text { font-size: 12px; color: var(--fg2); }
.hp-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.hp-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.hp-fill.hp-high { background: var(--green); }
.hp-fill.hp-mid { background: var(--yellow); }
.hp-fill.hp-low { background: var(--red); }
.pokemon-status { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; font-weight: 600; text-transform: uppercase; }
.st-burn { background: #f7768e33; color: var(--red); }
.st-paralyze { background: #e0af6833; color: var(--yellow); }
.st-poison, .st-toxic { background: #bb9af733; color: var(--purple); }
.st-sleep { background: #787c9933; color: var(--fg2); }
.st-freeze { background: #7dcfff33; color: #7dcfff; }
.stat-changes { font-size: 11px; color: var(--fg2); margin-top: 2px; }
.stat-up { color: var(--green); }
.stat-down { color: var(--red); }
.pokemon-meta { font-size: 11px; color: var(--fg2); margin-top: 2px; }

/* Move analysis */
.analysis { background: var(--bg2); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
.analysis-header { font-size: 12px; color: var(--fg2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
.move-row { display: flex; align-items: center; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.15s; margin-bottom: 3px; }
.move-row:hover { background: var(--bg3); }
.move-row.best { border-left: 3px solid var(--green); }
.move-bar { width: 60px; height: 20px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-right: 12px; flex-shrink: 0; }
.move-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.move-name { flex: 1; font-size: 14px; }
.move-pct { font-size: 14px; font-weight: 600; min-width: 50px; text-align: right; margin-right: 12px; }
.move-counter { font-size: 12px; color: var(--fg2); min-width: 140px; text-align: right; }
.forced-switch { padding: 14px; text-align: center; color: var(--yellow); font-size: 14px; }

/* History */
.history { background: var(--bg2); border-radius: 8px; padding: 14px; max-height: 200px; overflow-y: auto; }
.history-header { font-size: 12px; color: var(--fg2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.history-row { display: grid; grid-template-columns: 30px 1fr 1fr; gap: 8px; padding: 4px 0; font-size: 13px; border-bottom: 1px solid var(--bg3); }
.history-turn { color: var(--fg2); text-align: center; }

/* Controls */
.controls { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
.btn { padding: 8px 20px; border: 1px solid var(--bg3); background: var(--bg2); color: var(--fg); border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
.btn:hover { background: var(--bg3); }

/* Winner overlay */
.winner-banner { text-align: center; padding: 20px; margin-bottom: 16px; border-radius: 8px; font-size: 18px; font-weight: 600; }
.winner-banner.p1 { background: #9ece6a22; color: var(--green); }
.winner-banner.p2 { background: #f7768e22; color: var(--red); }

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--fg2); }
</style>
</head>
<body>
<div class="container">
<h1>GEN 3 BATTLE ENGINE</h1>

<div id="winner-banner"></div>

<!-- Eval bar -->
<div class="eval-container">
  <div class="eval-bar">
    <div class="eval-fill" id="eval-fill" style="width: 50%"></div>
    <div class="eval-label" id="eval-label">—</div>
  </div>
  <div class="eval-pct" id="eval-pct">—</div>
  <div class="depth-badge" id="depth-badge">...</div>
</div>

<!-- Battlefield -->
<div class="battlefield">
  <div class="team" id="team-p1"><div class="team-header">Your Team (P1)</div></div>
  <div class="team" id="team-p2"><div class="team-header">Opponent (P2)</div></div>
</div>

<!-- Analysis / Move selection -->
<div class="analysis" id="analysis-panel">
  <div class="analysis-header">
    <span>Move Analysis</span>
    <span id="nodes-info"></span>
  </div>
  <div id="moves-list"><div class="loading">Analyzing...</div></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn" onclick="resetGame()">New Game</button>
</div>

<!-- Move history -->
<div class="history" id="history-panel">
  <div class="history-header">Move History</div>
  <div id="history-list"></div>
</div>
</div>

<script>
let polling = null;
let lastAnalysis = null;

function hpClass(pct) {
  if (pct > 50) return 'hp-high';
  if (pct > 20) return 'hp-mid';
  return 'hp-low';
}

function statChanges(mon) {
  const stages = [
    ['Atk', mon.atkStage], ['Def', mon.defStage], ['SpA', mon.spaStage],
    ['SpD', mon.spdStage], ['Spe', mon.speStage]
  ].filter(([_, v]) => v !== 0);
  if (!stages.length) return '';
  return stages.map(([name, v]) =>
    `<span class="${v > 0 ? 'stat-up' : 'stat-down'}">${name} ${v > 0 ? '+' : ''}${v}</span>`
  ).join(' ');
}

function renderPokemon(mon) {
  const pct = mon.maxHp > 0 ? (mon.hp / mon.maxHp * 100) : 0;
  const cls = [
    'pokemon',
    mon.isActive ? 'active' : '',
    !mon.alive ? 'fainted' : ''
  ].filter(Boolean).join(' ');

  let statusHtml = '';
  if (mon.status) {
    statusHtml = `<span class="pokemon-status st-${mon.status}">${mon.status}</span>`;
  }

  let metaHtml = '';
  const meta = [];
  if (mon.item && !mon.itemConsumed) meta.push(mon.item);
  if (mon.substituteHp > 0) meta.push(`Sub: ${mon.substituteHp} HP`);
  if (mon.tauntTurns > 0) meta.push(`Taunted (${mon.tauntTurns})`);
  if (mon.moveLocked) meta.push(`Locked: ${mon.moveLocked}`);
  if (meta.length) metaHtml = `<div class="pokemon-meta">${meta.join(' · ')}</div>`;

  const sc = statChanges(mon);
  const scHtml = sc ? `<div class="stat-changes">${sc}</div>` : '';

  return `<div class="${cls}">
    <div class="pokemon-row">
      <span class="pokemon-name">${mon.species}${statusHtml}</span>
      <span class="pokemon-hp-text">${mon.alive ? `${mon.hp}/${mon.maxHp}` : 'FAINTED'}</span>
    </div>
    <div class="hp-bar"><div class="hp-fill ${hpClass(pct)}" style="width:${pct}%"></div></div>
    ${scHtml}${metaHtml}
  </div>`;
}

function renderTeam(containerId, team) {
  const el = document.getElementById(containerId);
  const header = el.querySelector('.team-header').outerHTML;
  el.innerHTML = header + team.map(renderPokemon).join('');
}

function moveColor(pct) {
  if (pct >= 50) return 'var(--green)';
  if (pct >= 35) return 'var(--accent)';
  if (pct >= 20) return 'var(--yellow)';
  return 'var(--red)';
}

function renderAnalysis(analysis, state) {
  const list = document.getElementById('moves-list');
  const nodesInfo = document.getElementById('nodes-info');

  if (!analysis) {
    list.innerHTML = '<div class="loading">Analyzing...</div>';
    nodesInfo.textContent = '';
    return;
  }

  // Check for forced switch (active mon fainted)
  const activeMon = state.p1.find(m => m.isActive);
  if (activeMon && !activeMon.alive) {
    const benchAlive = state.p1.filter((m, i) => !m.isActive && m.alive);
    list.innerHTML = '<div class="forced-switch">Your active Pokemon fainted! Choose a switch-in:</div>' +
      benchAlive.map((m, i) => {
        const realIdx = state.p1.findIndex(p => p.species === m.species);
        return `<div class="move-row" onclick="playMove(['switch', ${realIdx}])">
          <div class="move-name">Switch → ${m.species} (${m.hp}/${m.maxHp})</div>
        </div>`;
      }).join('');
    return;
  }

  nodesInfo.textContent = `${analysis.nodes.toLocaleString()} nodes`;

  const maxPct = Math.max(...analysis.moves.map(m => m.winPct), 1);

  list.innerHTML = analysis.moves.map(m => {
    const barW = (m.winPct / Math.max(maxPct, 50)) * 100;
    return `<div class="move-row ${m.isBest ? 'best' : ''}" onclick="playMove(${JSON.stringify(m.action)})">
      <div class="move-bar"><div class="move-bar-fill" style="width:${barW}%;background:${moveColor(m.winPct)}"></div></div>
      <div class="move-pct" style="color:${moveColor(m.winPct)}">${m.winPct}%</div>
      <div class="move-name">${m.name}</div>
      <div class="move-counter">vs ${m.counter}</div>
    </div>`;
  }).join('');
}

function renderEval(analysis) {
  const fill = document.getElementById('eval-fill');
  const label = document.getElementById('eval-label');
  const pct = document.getElementById('eval-pct');
  const badge = document.getElementById('depth-badge');

  if (!analysis) {
    fill.style.width = '50%';
    label.textContent = '—';
    pct.textContent = '—';
    badge.textContent = 'thinking...';
    badge.className = 'depth-badge running';
    return;
  }

  const v = analysis.positionValue;
  fill.style.width = v + '%';
  fill.style.background = v >= 50 ? 'var(--green)' : 'var(--accent)';
  label.textContent = `${v.toFixed(1)}%`;
  pct.textContent = `${v.toFixed(1)}%`;
  pct.style.color = v >= 50 ? 'var(--green)' : v >= 35 ? 'var(--accent)' : 'var(--red)';

  badge.textContent = `depth ${analysis.depth}`;
  badge.className = analysis.running ? 'depth-badge running' : 'depth-badge';
}

function renderHistory(history) {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<div style="color:var(--fg2);font-size:13px;padding:4px 0;">No moves yet</div>';
    return;
  }
  el.innerHTML = history.map(h =>
    `<div class="history-row">
      <span class="history-turn">${h.turn + 1}</span>
      <span>${h.p1}</span>
      <span>${h.p2}</span>
    </div>`
  ).join('');
}

function renderWinner(state) {
  const el = document.getElementById('winner-banner');
  if (!state.isTerminal) {
    el.innerHTML = '';
    return;
  }
  if (state.winner === 'p1') {
    el.innerHTML = '<div class="winner-banner p1">You win!</div>';
  } else {
    el.innerHTML = '<div class="winner-banner p2">Opponent wins.</div>';
  }
}

async function fetchState() {
  try {
    const res = await fetch('/api/state');
    const data = await res.json();

    renderTeam('team-p1', data.state.p1);
    renderTeam('team-p2', data.state.p2);
    renderEval(data.analysis);
    renderAnalysis(data.analysis, data.state);
    renderHistory(data.history);
    renderWinner(data.state);

    lastAnalysis = data.analysis;

    // Keep polling if analysis is still running
    if (data.analysis && !data.analysis.running && !data.state.isTerminal) {
      // Analysis done — slow down polling
      clearInterval(polling);
      polling = setInterval(fetchState, 5000);
    }
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

async function playMove(action) {
  clearInterval(polling);
  try {
    const res = await fetch('/api/play', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action}),
    });
    if (res.ok) {
      // Fast polling during analysis
      polling = setInterval(fetchState, 800);
      fetchState();
    }
  } catch (e) {
    console.error('Play error:', e);
  }
}

async function resetGame() {
  clearInterval(polling);
  await fetch('/api/reset', {method: 'POST'});
  polling = setInterval(fetchState, 800);
  fetchState();
}

// Start
polling = setInterval(fetchState, 800);
fetchState();
</script>
</body>
</html>
